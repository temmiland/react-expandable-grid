name: Bun CI

on:
    push:
        branches:
            - main
    workflow_dispatch:

concurrency:
    group: pages-deploy
    cancel-in-progress: false

permissions:
    contents: write

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  persist-credentials: false

            - name: Use bun
              uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
              with:
                  bun-version: 1
                  no-cache: true

            - name: Install, build, and build storybook
              run: |
                  bun install --frozen-lockfile
                  bun run build
                  bun run build-storybook

    deploy:
        needs: build
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Use bun
              uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
              with:
                  bun-version: 1
                  no-cache: true

            - name: Install and build storybook
              run: |
                  bun install --frozen-lockfile
                  bun run build-storybook

            - name: Deploy storybook to gh-pages
              env:
                  SOURCE_SHA: ${{ gitea.sha }}
              run: |
                  rm -rf /tmp/gh-pages-build
                  cp -r storybook-static /tmp/gh-pages-build

                  git config user.name "Temmi Pietsch"
                  git config user.email "welcome@temmi.land"

                  git checkout --orphan gh-pages-deploy
                  git rm -rf . > /dev/null
                  cp -r /tmp/gh-pages-build/. .
                  touch .nojekyll
                  git add -A
                  git commit -m "🚀 Deployed storybook (${SOURCE_SHA:0:7})"
                  git push origin gh-pages-deploy:gh-pages --force

            - name: Push gh-pages to GitHub
              env:
                  GH_PAT: ${{ secrets.GH_PAT }}
              run: |
                  git push "https://x-access-token:${GH_PAT}@github.com/temmiland/react-expandable-grid.git" \
                      gh-pages-deploy:gh-pages --force
